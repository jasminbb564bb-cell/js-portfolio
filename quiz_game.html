<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>モノクロクイズゲーム</title>
  <style>
    :root {
      --bg: #f4f4f5;
      --panel: #ffffff;
      --ink: #0a0a0a;
      --muted: #52525b;
      --line: #d4d4d8;
      --line-strong: #18181b;
      --soft: #eeeeef;
      --button: #111111;
      --button-hover: #2b2b2b;
      --success: #ffffff;
      --success-bg: #111111;
      --error: #111111;
      --error-bg: #e4e4e7;
      --focus: #737373;
      --shadow: 0 22px 54px rgba(0, 0, 0, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.035) 1px, transparent 1px),
        linear-gradient(rgba(0, 0, 0, 0.035) 1px, transparent 1px),
        var(--bg);
      background-size: 28px 28px;
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    .quiz-shell {
      width: min(100%, 720px);
      display: grid;
      gap: 16px;
    }

    .top-visual {
      min-height: 104px;
      overflow: hidden;
      border: 2px solid var(--line-strong);
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 8px 8px 0 #111111;
    }

    .top-visual svg {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 104px;
    }

    .quiz-card {
      padding: 28px;
      background: var(--panel);
      border: 2px solid var(--line-strong);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .status-bar {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 16px;
      padding-bottom: 18px;
      border-bottom: 2px solid var(--line-strong);
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 800;
    }

    .progress-track {
      height: 10px;
      margin-top: 10px;
      overflow: hidden;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      background: #ffffff;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: repeating-linear-gradient(
        45deg,
        #111111,
        #111111 8px,
        #3f3f46 8px,
        #3f3f46 16px
      );
      transition: width 0.25s ease;
    }

    .score-pill {
      min-width: 112px;
      padding: 8px 12px;
      border: 2px solid var(--line-strong);
      border-radius: 8px;
      background: var(--soft);
      color: var(--ink);
      text-align: center;
    }

    .question-area {
      min-height: 164px;
      display: grid;
      place-items: center;
      padding: 32px 0 24px;
      text-align: center;
    }

    .question-text {
      margin: 0;
      color: var(--ink);
      font-size: clamp(1.42rem, 4vw, 2.15rem);
      font-weight: 900;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .answer-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
    }

    .answer-input {
      width: 100%;
      min-height: 50px;
      padding: 0 15px;
      border: 2px solid var(--line-strong);
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
      font: inherit;
      outline: none;
    }

    .answer-input:focus {
      box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.16);
    }

    .answer-input:disabled {
      background: #e4e4e7;
      color: var(--muted);
      cursor: not-allowed;
    }

    .feedback {
      min-height: 50px;
      margin-top: 16px;
      padding: 12px 14px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
      color: var(--ink);
      font-weight: 800;
      text-align: center;
      overflow-wrap: anywhere;
    }

    .feedback.correct {
      border-color: #111111;
      background: var(--success-bg);
      color: var(--success);
    }

    .feedback.incorrect {
      border-color: #111111;
      background: var(--error-bg);
      color: var(--error);
    }

    .button-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    button {
      min-height: 50px;
      min-width: 116px;
      border: 2px solid var(--line-strong);
      border-radius: 8px;
      padding: 0 18px;
      background: var(--button);
      color: #ffffff;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      transition: background 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
    }

    button:hover:not(:disabled) {
      background: var(--button-hover);
      transform: translateY(-1px);
      box-shadow: 6px 6px 0 #000000;
    }

    button:focus-visible {
      outline: 4px solid var(--focus);
      outline-offset: 3px;
    }

    button:disabled {
      background: #a1a1aa;
      color: #f4f4f5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .secondary-button {
      background: #ffffff;
      color: var(--ink);
    }

    .secondary-button:hover:not(:disabled) {
      background: #f4f4f5;
      box-shadow: 6px 6px 0 #000000;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 560px) {
      body {
        padding: 16px;
      }

      .top-visual {
        box-shadow: 5px 5px 0 #111111;
      }

      .quiz-card {
        padding: 20px;
      }

      .status-bar {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .score-pill {
        min-width: 0;
        width: 100%;
      }

      .question-area {
        min-height: 142px;
        padding: 26px 0 20px;
      }

      .answer-row {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="quiz-shell" aria-label="モノクロクイズゲーム">
    <div class="top-visual" aria-hidden="true">
      <svg viewBox="0 0 720 124" role="img">
        <rect width="720" height="124" fill="#ffffff"></rect>
        <path d="M0 92 H720" stroke="#111111" stroke-width="3"></path>
        <path d="M52 92 L116 32 L180 92 Z" fill="#111111"></path>
        <path d="M248 92 L318 20 L388 92 Z" fill="#ffffff" stroke="#111111" stroke-width="6"></path>
        <circle cx="506" cy="60" r="32" fill="#111111"></circle>
        <rect x="600" y="28" width="70" height="64" rx="8" fill="#ffffff" stroke="#111111" stroke-width="6"></rect>
        <path d="M616 51 H654 M616 69 H642" stroke="#111111" stroke-width="6" stroke-linecap="round"></path>
        <path d="M0 110 C112 94 182 114 278 100 C390 84 470 118 586 96 C636 86 680 88 720 78" fill="none" stroke="#111111" stroke-width="5"></path>
      </svg>
    </div>

    <section class="quiz-card">
      <header class="status-bar">
        <div>
          <div id="progressText">問題 0 / 5</div>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>
        <div class="score-pill" id="scoreText">スコア: 0</div>
      </header>

      <section class="question-area" aria-live="polite">
        <p class="question-text" id="questionText">スタートを押してください</p>
      </section>

      <div class="answer-row">
        <input
          class="answer-input"
          id="answerInput"
          type="text"
          autocomplete="off"
          placeholder="答えを入力"
          disabled
        >
        <button id="submitButton" type="button" disabled>回答</button>
      </div>

      <div class="feedback" id="feedbackArea" aria-live="polite">準備ができたら始めてください。</div>

      <div class="button-row">
        <button id="startButton" type="button">スタート</button>
        <button class="secondary-button hidden" id="retryButton" type="button">もう一度</button>
      </div>
    </section>
  </main>

  <script>
    const questions = [
      {
        question: "日本国憲法が施行された年は？",
        answers: ["1947年", "1947", "昭和22年"]
      },
      {
        question: "太陽系で最も大きい惑星は？",
        answers: ["木星", "もくせい", "ジュピター", "jupiter"]
      },
      {
        question: "三平方の定理で有名な古代ギリシャの数学者は？",
        answers: ["ピタゴラス", "ぴたごらす", "pythagoras"]
      },
      {
        question: "元素記号 Fe が表す元素は？",
        answers: ["鉄", "てつ", "iron"]
      },
      {
        question: "『吾輩は猫である』の作者は？",
        answers: ["夏目漱石", "なつめそうせき", "漱石"]
      }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let isPlaying = false;

    const progressText = document.getElementById("progressText");
    const progressFill = document.getElementById("progressFill");
    const scoreText = document.getElementById("scoreText");
    const questionText = document.getElementById("questionText");
    const answerInput = document.getElementById("answerInput");
    const submitButton = document.getElementById("submitButton");
    const feedbackArea = document.getElementById("feedbackArea");
    const startButton = document.getElementById("startButton");
    const retryButton = document.getElementById("retryButton");

    function startGame() {
      currentQuestionIndex = 0;
      score = 0;
      isPlaying = true;

      startButton.classList.add("hidden");
      retryButton.classList.add("hidden");
      answerInput.disabled = false;
      submitButton.disabled = false;
      updateStatus();
      showQuestion();
    }

    function showQuestion() {
      const currentQuestion = questions[currentQuestionIndex];

      questionText.textContent = currentQuestion.question;
      answerInput.value = "";
      answerInput.disabled = false;
      submitButton.disabled = false;
      feedbackArea.textContent = "答えを入力してください。";
      feedbackArea.classList.remove("correct", "incorrect");
      answerInput.focus();
      updateStatus();
    }

    function normalizeAnswer(value) {
      return value.trim().replace(/\s+/g, "").toLowerCase();
    }

    function submitAnswer() {
      if (!isPlaying || submitButton.disabled) {
        return;
      }

      const userAnswer = normalizeAnswer(answerInput.value);
      const currentQuestion = questions[currentQuestionIndex];
      const isCorrect = currentQuestion.answers
        .map(normalizeAnswer)
        .includes(userAnswer);

      answerInput.disabled = true;
      submitButton.disabled = true;

      if (isCorrect) {
        score += 1;
        feedbackArea.textContent = "正解です！";
        feedbackArea.classList.add("correct");
        feedbackArea.classList.remove("incorrect");
      } else {
        feedbackArea.textContent = `不正解です。正解は「${currentQuestion.answers[0]}」です。`;
        feedbackArea.classList.add("incorrect");
        feedbackArea.classList.remove("correct");
      }

      currentQuestionIndex += 1;
      updateStatus();

      if (currentQuestionIndex >= questions.length) {
        window.setTimeout(finishGame, 850);
        return;
      }

      window.setTimeout(showQuestion, 850);
    }

    function finishGame() {
      isPlaying = false;
      questionText.textContent = `終了です。最終スコアは ${score} / ${questions.length} です。`;
      answerInput.value = "";
      answerInput.disabled = true;
      submitButton.disabled = true;
      retryButton.classList.remove("hidden");
      updateStatus();
    }

    function updateStatus() {
      const displayQuestionNumber = isPlaying
        ? Math.min(currentQuestionIndex + 1, questions.length)
        : currentQuestionIndex;
      const completedQuestions = Math.min(currentQuestionIndex, questions.length);
      const progressPercent = (completedQuestions / questions.length) * 100;

      progressText.textContent = `問題 ${displayQuestionNumber} / ${questions.length}`;
      scoreText.textContent = `スコア: ${score}`;
      progressFill.style.width = `${progressPercent}%`;
    }

    startButton.addEventListener("click", startGame);
    retryButton.addEventListener("click", startGame);
    submitButton.addEventListener("click", submitAnswer);
    answerInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        submitAnswer();
      }
    });
  </script>
</body>
</html>
